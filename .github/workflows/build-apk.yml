name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: tru

      - name: Force Flet to use current Flutter
        run: |
          # Flet'in indirmeye çalışacağı yere biz 3.29'un sembolik linkini koyuyoruz
          mkdir -p ~/.flet/bin/flutter
          ln -s $FLUTTER_ROOT ~/.flet/bin/flutter/bin

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
          unzip -q commandlinetools-linux-12266719_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx tesseract-ocr tesseract-ocr-tur libzbar0 build-essential libgtk-3-dev

      - name: Accept Android Licenses (SDK 35 Destekli)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "platforms;android-35" "build-tools;33.0.0" "build-tools;35.0.0" || true
          yes | flutter doctor --android-licenses || true

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install 'flet[all]==0.26.0'

      - name: Final Build (Wakelock - Eski Sürüm 1.2.8 - Numpy fix - Güncel Flet - KESİN)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          FLET_NON_INTERACTIVE: "true"
        run: |
          # 1. PIP YAPILANDIRMASI
          mkdir -p ~/.pip
          cat > ~/.pip/pip.conf << 'EOF'
          [global]
          index-url = https://pypi.flet.dev
          extra-index-url = https://pypi.org/simple
          trusted-host = pypi.flet.dev
          EOF

          # 2. ANDROID KONFİGÜRASYONU
          export SERIOUS_PYTHON_CONFIG='{"android": {"ndk_version": "25.2.9519653", "arch": "arm64-v8a"}}'
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # 3. ÖNCE WAKELOCK 1.2.8'İ PUB-CACHE'E İNDİR (Kritik!)
          flutter pub cache add wakelock_plus
          # 1.4.0'ı silip 1.2.8'i zorla indir
          rm -rf /home/runner/.pub-cache/hosted/pub.dev/wakelock_plus-1.4.0 2>/dev/null || true

          # 4. PUSU MODU (Wakelock 1.2.8 Sabitleme - Agresif)
          (
            while true; do
              # Proje dizinini bul
              PROJECT_DIR=$(find /tmp -type d -path "*/flet_flutter_build*/android" 2>/dev/null | head -1)
              
              if [ ! -z "$PROJECT_DIR" ]; then
                echo "🔥 Proje dizini bulundu: $PROJECT_DIR"
                
                # 2. app/build.gradle namespace ekle
                APP_GRADLE="$PROJECT_DIR/app/build.gradle"
                if [ -f "$APP_GRADLE" ] && ! grep -q "namespace" "$APP_GRADLE"; then
                  sed -i '/android {/a \    namespace "com.anna.mobile"' "$APP_GRADLE"
                  echo "✅ app/build.gradle namespace eklendi!"
                fi
                
                # 3. settings.gradle Kotlin sabitleme
                SETTINGS_GRADLE="$PROJECT_DIR/settings.gradle"
                if [ -f "$SETTINGS_GRADLE" ]; then
                  sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.0.21"/g' "$SETTINGS_GRADLE"
                  echo "✅ settings.gradle Kotlin sürümü güncellendi!"
                fi

                # 4. CRITICAL: pubspec.yaml bul ve dependency_overrides ekle (2 kez dene)
                PUBSPEC=$(find "$PROJECT_DIR/.." -name "pubspec.yaml" 2>/dev/null | head -1)
                if [ ! -z "$PUBSPEC" ]; then
                  echo "📄 pubspec.yaml bulundu: $PUBSPEC"
                  
                  # Önce dependency_overrides varsa içindeki wakelock_plus'ı güncelle
                  if grep -q "dependency_overrides" "$PUBSPEC"; then
                    sed -i 's/  wakelock_plus:.*/  wakelock_plus: 1.2.8/g' "$PUBSPEC"
                  else
                    echo -e "\ndependency_overrides:\n  wakelock_plus: 1.2.8" >> "$PUBSPEC"
                  fi
                  echo "✅ dependency_overrides ile wakelock_plus 1.2.8'e sabitlendi!"
                fi
                
                # 5. 1.4.0'ı temizlemek için ek bir güvence
                if [ -d "/home/runner/.pub-cache/hosted/pub.dev/wakelock_plus-1.4.0" ]; then
                  rm -rf "/home/runner/.pub-cache/hosted/pub.dev/wakelock_plus-1.4.0"
                  echo "❌ wakelock_plus 1.4.0 zorla silindi!"
                fi

                # 6. libc++_shared.so'yu APK'ya eklemek için Gradle'ı yamala
                if [ -f "$APP_GRADLE" ]; then
                  if ! grep -q "packagingOptions" "$APP_GRADLE"; then
                      sed -i '/android {/a \    packagingOptions {\n        pickFirsts = ["**/*.so"]\n        doNotStrip = ["**/*.so"]\n    }' "$APP_GRADLE"
                      echo "✅ packagingOptions eklendi (libc++_shared.so için)!"
                    fi
                  fi
                
                break
              fi
              sleep 1
            done
          ) &


          # 5. Opencv İle Mediapipe Ve Gerekli Paketlerin Kurulum Aşamaları
          (
            while true; do
              PROJECT_DIR=$(find /tmp -type d -path "*/flet_flutter_build*/android" 2>/dev/null | head -1)
              
              if [ ! -z "$PROJECT_DIR" ]; then
                echo "🔥 Proje dizini bulundu: $PROJECT_DIR"
                
                # 0. Klasörü Hazırla (En Önemli Kısım)
                mkdir -p ./wheels
                echo "📁 Wheels klasörü hazırlandı."

                # 1. MediaPipe 0.10.18 Operasyonu
                echo "📦 MediaPipe 0.10.18 indiriliyor..."
                WHEEL_MP="https://files.pythonhosted.org/packages/db/57/0268448651884328e18ec3391d374ec78280f5f84813583151b03372f854/mediapipe-0.10.18-cp312-cp312-manylinux_2_17_aarch64.manylinux2014_aarch64.whl"
                wget -O ./wheels/mediapipe_v8a.whl "$WHEEL_MP"
                pip install ./wheels/mediapipe_v8a.whl
                echo "✅ MediaPipe kuruldu!"

                # 2. OpenCV 4.10.0 Operasyonu (Yeni Bypass)
                echo "📦 OpenCV 4.10.0 indiriliyor..."
                WHEEL_CV="https://pypi.flet.dev/packages/opencv-python-headless/opencv_python_headless-4.10.0.84-cp312-cp312-android_24_arm64_v8a.whl"
                wget -O ./wheels/opencv_android.whl "$WHEEL_CV"
                if [ -f "./wheels/opencv_android.whl" ]; then
                  pip install ./wheels/opencv_android.whl
                  echo "✅ OpenCV kuruldu!"
                else
                  echo "❌ OpenCV dosyası inemedi!"
                fi

                # 3. Psutil 7.2.2 Operasyonu (Senin bulduğun efsane linkle)
                echo "📦 Psutil 7.2.2 indiriliyor..."
                WHEEL_PSUTIL="https://files.pythonhosted.org/packages/8e/13/125093eadae863ce03c6ffdbae9929430d116a246ef69866dad94da3bfbc/psutil-7.2.2-cp36-abi3-musllinux_1_2_aarch64.whl"
                wget -O ./wheels/psutil_v8a.whl "$WHEEL_PSUTIL"
                pip install ./wheels/psutil_v8a.whl
                echo "✅ Psutil kuruldu!"

                # 4. Pygame 2.6.1 Operasyonu (Altın Bilet)
                echo "📦 Pygame 2.6.1 indiriliyor..."
                WHEEL_PYGAME="https://files.pythonhosted.org/packages/45/82/38456860010959082987a07527633e46c92135063462a346e9dfd827a4d5/pygame-2.6.1-cp312-cp312-manylinux_2_17_aarch64.manylinux2014_aarch64.whl"
                wget -O ./wheels/pygame_v8a.whl "$WHEEL_PYGAME"
                pip install ./wheels/pygame_v8a.whl
                echo "✅ Pygame kuruldu!"

                # 5. Gradle ve Packaging Yaması
                APP_GRADLE="$PROJECT_DIR/app/build.gradle"
                if [ -f "$APP_GRADLE" ]; then
                  if ! grep -q "packagingOptions" "$APP_GRADLE"; then
                    sed -i '/android {/a \    packagingOptions {\n        pickFirsts = ["**/*.so"]\n        doNotStrip = ["**/*.so"]\n    }' "$APP_GRADLE"
                    echo "✅ packagingOptions eklendi!"
                  fi
                fi
                
                echo "🚀 Tüm bypass operasyonları başarıyla tamamlandı, build devam ediyor..."
                break
              fi
              sleep 2
            done
          ) &

          # 1. Flet'in indirme yaptığı dizini önceden biz oluşturalım
              echo "🔨 Flet'in inatçı damarını kesiyoruz..."
              
              # 1. Flet'in gitmeye çalıştığı dizini tertemiz oluştur
              mkdir -p /home/runner/flutter/3.27.3/bin
              
              # 2. KRİTİK: Sembolik link yerine 'Wrapper' (Yönlendirici) yazalım
              # Flet /home/runner/flutter/3.27.3/bin/flutter'ı çağırdığında 
              # aslında bizim 3.29'u çalıştıracak.
              
              cat > /home/runner/flutter/3.27.3/bin/flutter << EOF
              #!/bin/bash
              exec $FLUTTER_ROOT/bin/flutter "\$@"
              EOF
              
              cat > /home/runner/flutter/3.27.3/bin/dart << EOF
              #!/bin/bash
              exec $FLUTTER_ROOT/bin/dart "\$@"
              EOF
              
              # 3. Çalıştırma izinlerini ver
              chmod +x /home/runner/flutter/3.27.3/bin/flutter
              chmod +x /home/runner/flutter/3.27.3/bin/dart
              
              # 4. Flet'in "yüklendi" sanması için bir işaret bırak (dummy file)
              touch /home/runner/flutter/3.27.3/.complete
              
              # 5. Environment Variables
              export FLUTTER_ROOT="$FLUTTER_ROOT"
              export PATH="$FLUTTER_ROOT/bin:$PATH"
              export FLET_CLI_SKIP_FLUTTER_DOCTOR=true
              
              # 6. Kontrol
              echo "🎯 Sahte 3.27.3 üzerinden çalışan gerçek sürüm:"
              /home/runner/flutter/3.27.3/bin/flutter --version
              
              # 7. Gerçek Build
              flet build apk --verbose \
                --build-number ${{ github.run_number }} \
                --build-version "0.4.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk