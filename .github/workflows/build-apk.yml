name: Build ANNA Mobile APK - Bolu 60

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Pre-emptive Wakelock Fix (Kökten Çözüm)
        run: |
          # 1. Kütüphane klasörünü önceden biz oluşturuyoruz
          WAKELOCK_DIR="$HOME/.pub-cache/hosted/pub.dev/wakelock_plus-1.4.0/android"
          mkdir -p "$WAKELOCK_DIR"
          
          # 2. İçine tertemiz ve hatasız bir build.gradle dosyası yazıyoruz
          # Bu dosya 'unknown property flutter' ve 'substring' hatalarını imkansız hale getirir
          cat > "$WAKELOCK_DIR/build.gradle" << 'EOF'
          group 'com.wakelock_plus'
          version '1.0-SNAPSHOT'

          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }

          apply plugin: 'com.android.library'

          // Sahte flutter objesi ekleyerek hatayı kökten engelliyoruz
          project.ext.flutter = [
              compileSdkVersion: 35,
              minSdkVersion: 21,
              targetSdkVersion: 35
          ]

          android {
              namespace "com.wakelock_plus"
              compileSdkVersion 35
              
              defaultConfig {
                  minSdkVersion 21
                  targetSdkVersion 35
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF
          echo "✅ Wakelock dosyası önceden hazırlandı, artık hata veremez!"

      - name: Final Build (Flet Kurulumu ve Agresif Pusu)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          FLET_NON_INTERACTIVE: "true"
        run: |
          # 1. FLET'İ SİSTEME TANIT (EKSİK PARÇA BU!)
          pip install flet --upgrade

          # 2. PIP VE NUMPY YAPILANDIRMASI
          mkdir -p ~/.pip
          cat > ~/.pip/pip.conf << EOF
          [global]
          index-url = https://pypi.flet.dev
          trusted-host = pypi.flet.dev
          EOF

          # 3. AGRESİF PUSU (Saniyede 2 kez kontrol)
          while true; do
            ALL_WAKELOCKS=$(find /home/runner /tmp -name "build.gradle" -path "*/wakelock_plus-1.4.0/*" 2>/dev/null)
            for W_GRADLE in $ALL_WAKELOCKS; do
              if ! grep -q "namespace" "$W_GRADLE"; then
                sed -i '1i project.ext.flutter = [compileSdkVersion: 35, minSdkVersion: 21, targetSdkVersion: 35]\nandroid { namespace "com.wakelock_plus" }' "$W_GRADLE"
                echo "🎯 Pusu başarılı: $W_GRADLE yamalandı!"
              fi
            done

            SETTINGS_GRADLE=$(find /tmp -name "settings.gradle" 2>/dev/null | head -1)
            if [ ! -z "$SETTINGS_GRADLE" ] && ! grep -q "2.0.21" "$SETTINGS_GRADLE"; then
              sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.0.21"/g' "$SETTINGS_GRADLE"
            fi
            sleep 0.5
          done &

          # 4. FİNAL VURUŞ (TRANCE MÜZİK DEVAM!)
          flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "0.4.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk