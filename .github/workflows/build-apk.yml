name: Build ANNA Mobile APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev \
            libgomp1 \
            tesseract-ocr \
            tesseract-ocr-tur \
            tesseract-ocr-jpn \
            tesseract-ocr-chi-sim \
            tesseract-ocr-kor \
            portaudio19-dev \
            libsndfile1 \
            cmake \
            build-essential \
            gfortran \
            libopenblas-dev \
            liblapack-dev \
            zip \
            unzip

      - name: Free Disk Space (Disk Temizliği)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLS_DIRECTORY"
          docker image prune --all --force
          echo "Disk temizlendi, yer açıldı!"
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          
          # NUMPY HATASI ÇÖZÜMÜ: Spesifik ve uyumlu bir sürüm kuruyoruz.
          # OpenCV ve MediaPipe ile çakışmaması için 1.26.4 genellikle en güvenlisidir.
          pip install numpy==1.26.4
          
          # Ağır paketleri sırayla ve headless kuruyoruz
          pip install opencv-python-headless==4.9.0.80
          pip install mediapipe
          pip install easyocr
          pip install googletrans
          
          # Flet ve diğerleri
          pip install \
            flet==0.24.0 \
            python-dotenv requests pillow psutil pytesseract pyzbar \
            SpeechRecognition gTTS edge-tts pygame pvporcupine \
            sounddevice soundfile google-generativeai groq
          
      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
          NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
          PICOVOICE_ACCESS_KEY=${{ secrets.PICOVOICE_ACCESS_KEY }}
          EOF
          
      - name: Hard Cleanup (Physical Removal)
        run: |
          # Flet'in kafasını karıştıran tüm binary ve gereksiz dosyaları fiziksel olarak siliyoruz
          rm -rf data ocr __pycache__ .git .github .venv build dist
          find . -name "*.hash" -type f -delete
          find . -name "*.jpg" -type f -delete
          find . -name "*.png" -type f -delete
          find . -name "*.log" -type f -delete
          find . -name "*.pyc" -type f -delete
          echo "Suçlu dosyalar infaz edildi, yol temiz!"aaa

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Build APK (Anka Kuşu Modu)
        run: |          
          
          # 2. KOTLIN YAMASI (Arka Planda)
          while true; do
            ALL_GRADLES=$(find /tmp -name "build.gradle" 2>/dev/null)
            if [ ! -z "$ALL_GRADLES" ]; then
              for gradle in $ALL_GRADLES; do
                sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' "$gradle" 2>/dev/null
              done
              break
            fi
            sleep 1
          done &

          # 3. BUİLD (Artık main.py yerinde duruyor!)
          flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "${{ github.event.inputs.version || '0.4' }}.${{ github.run_number }}"
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ANNA-Mobile-v${{ github.event.inputs.version || '0.4' }}.${{ github.run_number }}
          path: build/apk/*.apk
          retention-days: 30