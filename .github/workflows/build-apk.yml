name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
          unzip -q commandlinetools-linux-12266719_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx tesseract-ocr tesseract-ocr-tur libzbar0 build-essential libgtk-3-dev

      - name: Accept Android Licenses (SDK 35 Destekli)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "platforms;android-35" "build-tools;33.0.0" "build-tools;35.0.0" || true
          yes | flutter doctor --android-licenses || true

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1

      - name: Final Build (Wakelock - Plugin Çözümü)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          FLET_NON_INTERACTIVE: "true"
        run: |
          # 1. PIP VE NUMPY YAPILANDIRMASI
          mkdir -p ~/.pip
          cat > ~/.pip/pip.conf << EOF
          [global]
          index-url = https://pypi.flet.dev
          trusted-host = pypi.flet.dev
          EOF

          cat > requirements.txt << EOF
          flet-embed==0.24.1
          EOF

          mkdir -p ./libs
          pip download --only-binary :all: --platform manylinux2014_aarch64 --python-version 3.12 --dest ./libs numpy==1.26.4 || true

          # 2. ANDROID KONFİGÜRASYONU
          export SERIOUS_PYTHON_CONFIG='{"android": {"ndk_version": "25.2.9519653", "arch": "arm64-v8a"}}'
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # 3. PUSU MODU (Wakelock Plugin Çözümü)
          while true; do
            # Proje dizinini bul
            PROJECT_DIR=$(find /tmp -type d -path "*/flet_flutter_build*/android" 2>/dev/null | head -1)
            
            if [ ! -z "$PROJECT_DIR" ]; then
              echo "🔥 Proje dizini bulundu: $PROJECT_DIR"
              
              # app/build.gradle dosyasını bul ve namespace'i kontrol et
              APP_GRADLE="$PROJECT_DIR/app/build.gradle"
              if [ -f "$APP_GRADLE" ]; then
                # Namespace ekle (yoksa)
                if ! grep -q "namespace" "$APP_GRADLE"; then
                  sed -i '/android {/a \    namespace "com.anna.mobile"' "$APP_GRADLE"
                  echo "✅ app/build.gradle namespace eklendi!"
                fi
              fi
              
              # settings.gradle'de plugin'leri kontrol et
              SETTINGS_GRADLE="$PROJECT_DIR/settings.gradle"
              if [ -f "$SETTINGS_GRADLE" ]; then
                # Kotlin sürümünü 2.0.21'e sabitle
                sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.0.21"/g' "$SETTINGS_GRADLE"
                echo "✅ settings.gradle Kotlin sürümü güncellendi!"
              fi
              
              break
            fi
            
            # Wakelock dizinini bul ve yapılandır (yedek)
            WAKELOCK_DIR=$(find /home/runner/.pub-cache -type d -name "wakelock_plus-1.4.0" 2>/dev/null | head -1)
            if [ ! -z "$WAKELOCK_DIR" ]; then
              WAKELOCK_GRADLE="$WAKELOCK_DIR/android/build.gradle"
              WAKELOCK_MANIFEST="$WAKELOCK_DIR/android/src/main/AndroidManifest.xml"
              
              # Manifest'te package varsa namespace'e çevir
              if [ -f "$WAKELOCK_MANIFEST" ]; then
                sed -i 's/package="dev.fluttercommunity.plus.wakelock"//g' "$WAKELOCK_MANIFEST"
                echo "✅ Wakelock manifest düzeltildi!"
              fi
              
              # 2. HAMLE: build.gradle'ı doğru namespace ile sıfırdan yazıyoruz
              echo "group 'dev.fluttercommunity.plus.wakelock'" > "$WAKELOCK_GRADLE"
              echo "version '1.0-SNAPSHOT'" >> "$WAKELOCK_GRADLE"
              echo "" >> "$WAKELOCK_GRADLE"
              echo "apply plugin: 'com.android.library'" >> "$WAKELOCK_GRADLE"
              echo "" >> "$WAKELOCK_GRADLE"
              echo "android {" >> "$WAKELOCK_GRADLE"
              echo "    namespace \"dev.fluttercommunity.plus.wakelock\"" >> "$WAKELOCK_GRADLE"
              echo "    compileSdkVersion 35" >> "$WAKELOCK_GRADLE"
              echo "" >> "$WAKELOCK_GRADLE"
              echo "    defaultConfig {" >> "$WAKELOCK_GRADLE"
              echo "        minSdkVersion 21" >> "$WAKELOCK_GRADLE"
              echo "        targetSdkVersion 35" >> "$WAKELOCK_GRADLE"
              echo "    }" >> "$WAKELOCK_GRADLE"
              echo "" >> "$WAKELOCK_GRADLE"
              echo "    compileOptions {" >> "$WAKELOCK_GRADLE"
              echo "        sourceCompatibility JavaVersion.VERSION_17" >> "$WAKELOCK_GRADLE"
              echo "        targetCompatibility JavaVersion.VERSION_17" >> "$WAKELOCK_GRADLE"
              echo "    }" >> "$WAKELOCK_GRADLE"
              echo "}" >> "$WAKELOCK_GRADLE"
              
              echo "✅ Wakelock build.gradle ve namespace jilet gibi oldu!"
              break
            fi

          # 4. FİNAL VURUŞ
          flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "0.4.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk