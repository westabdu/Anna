name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx tesseract-ocr tesseract-ocr-tur libzbar0 build-essential

      - name: Install Flet (Stabil Sürüm Sabitleme)
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1

      - name: Accept Android Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter config --no-analytics

      - name: Final Build (Gece Operasyonu - Zafer)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          PIP_CACHE_DIR: /tmp/pip-cache
          TMPDIR: /tmp
          FLET_NON_INTERACTIVE: "true"
        run: |
          # 1. KOTLIN VE GRADLE YAMASI
          while true; do
            SETTINGS_GRADLE=$(find /tmp -name "settings.gradle" 2>/dev/null | head -1)
            if [ ! -z "$SETTINGS_GRADLE" ]; then
              sed -i 's/plugins {/plugins {\n    id "org.jetbrains.kotlin.android" version "1.9.24" apply false/g' "$SETTINGS_GRADLE" 2>/dev/null
              break
            fi
            sleep 1
          done &

          while true; do
            ALL_GRADLES=$(find /tmp -name "*.gradle" 2>/dev/null)
            if [ ! -z "$ALL_GRADLES" ]; then
              for gradle in $ALL_GRADLES; do
                sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' "$gradle" 2>/dev/null
                if [[ "$gradle" == *"build.gradle"* ]] && grep -q "android {" "$gradle"; then
                  sed -i '/android {/a \    packagingOptions { doNotStrip "**/*.so"; pickFirst "**/*.so" }' "$gradle"
                  sed -i '/android {/a \    aaptOptions { noCompress "so", "zip", "gz", "pyc", "ttf", "otf", "tflite" }' "$gradle"
                  sed -i 's/compileSdk = .*/compileSdk = 34/g' "$gradle" 2>/dev/null
                  sed -i 's/targetSdk = .*/targetSdk = 34/g' "$gradle" 2>/dev/null
                fi
              done
              break
            fi
            sleep 1
          done &

          # 2. KRİTİK: Pip konfigürasyonu
          mkdir -p /tmp/pip-conf
          cat > /tmp/pip-conf/pip.conf << 'EOF'
          [global]
          find-links = /tmp/numpy-wheel
          no-index = false
          extra-index-url = https://pypi.flet.dev
          trusted-host = pypi.flet.dev
          EOF

          # 3. NUMPY ZORLAMA OPERASYONU
          rm -rf ~/.cache/pip
          rm -rf /tmp/pip-*
          mkdir -p /tmp/numpy-wheel
          pip download --only-binary :all: --platform manylinux2014_x86_64 --python-version 3.11 --dest /tmp/numpy-wheel numpy==1.26.4

          export PIP_CONFIG_FILE=/tmp/pip-conf/pip.conf
          export PIP_FIND_LINKS=/tmp/numpy-wheel
          export PIP_EXTRA_INDEX_URL=https://pypi.flet.dev
          echo "numpy==1.26.4" > requirements.txt

          # 4. ANA BUILD KOMUTU (SESSİZCE VE ZORLA)
          yes | flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "${{ github.event.inputs.version || '0.4' }}.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk