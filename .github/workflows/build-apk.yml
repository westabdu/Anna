name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      # Android SDK'yı kur - HAZIR ACTION KULLAN!
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-33 build-tools;33.0.0'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx tesseract-ocr tesseract-ocr-tur libzbar0 build-essential

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1

      - name: Final Build (Geceyi Bitiren Hamle)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          FLET_NON_INTERACTIVE: "true"
        run: |
          # 1. KOTLIN VE GRADLE YAMASI
          while true; do
            SETTINGS_GRADLE=$(find /tmp -name "settings.gradle" 2>/dev/null | head -1)
            if [ ! -z "$SETTINGS_GRADLE" ]; then
              sed -i 's/plugins {/plugins {\n    id "org.jetbrains.kotlin.android" version "1.9.24" apply false/g' "$SETTINGS_GRADLE" 2>/dev/null
              break
            fi
            sleep 1
          done &

          # 2. NUMPY - DOĞRU PLATFORM İLE İNDİR
          mkdir -p ./libs
          pip download \
            --only-binary :all: \
            --platform manylinux2014_x86_64 \
            --python-version 3.11 \
            --dest ./libs \
            numpy==1.26.4

          # 3. requirements.txt
          cat > requirements.txt << EOF
          numpy==1.26.4
          opencv-python-headless==4.9.0.80
          mediapipe==0.10.8
          easyocr==1.7.1
          pytesseract==0.3.10
          pyzbar==0.1.9
          SpeechRecognition==3.10.4
          gTTS==2.5.1
          edge-tts==6.1.13
          pygame==2.5.2
          pvporcupine==3.0.3
          sounddevice==0.4.6
          soundfile==0.12.1
          google-generativeai
          groq
          pillow==11.1.0
          python-dotenv==1.0.1
          requests==2.32.3
          psutil==7.0.0
          googletrans
          EOF

          # 4. Pip konfigürasyonu
          mkdir -p ~/.pip
          cat > ~/.pip/pip.conf << EOF
          [global]
          find-links = $(pwd)/libs
          extra-index-url = https://pypi.flet.dev
          trusted-host = pypi.flet.dev
          EOF

          # 5. ANA BUILD KOMUTU
          flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "${{ github.event.inputs.version || '0.4' }}.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk