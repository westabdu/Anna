name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
          unzip -q commandlinetools-linux-12266719_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx tesseract-ocr tesseract-ocr-tur libzbar0 build-essential libgtk-3-dev

      - name: Accept Android Licenses (SDK 35 Destekli)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "platforms;android-35" "build-tools;33.0.0" "build-tools;35.0.0" || true
          yes | flutter doctor --android-licenses || true

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1

      - name: Final Build (Wakelock Nükleer Pusu Modu)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          FLET_NON_INTERACTIVE: "true"
        run: |
          # 1. PIP VE NUMPY YAPILANDIRMASI
          mkdir -p ~/.pip
          cat > ~/.pip/pip.conf << EOF
          [global]
          index-url = https://pypi.flet.dev
          trusted-host = pypi.flet.dev
          EOF

          cat > requirements.txt << EOF
          flet-embed==0.24.1
          EOF

          mkdir -p ./libs
          pip download --only-binary :all: --platform manylinux2014_aarch64 --python-version 3.12 --dest ./libs numpy==1.26.4 || true

          # 2. ANDROID KONFİGÜRASYONU
          export SERIOUS_PYTHON_CONFIG='{"android": {"ndk_version": "25.2.9519653", "arch": "arm64-v8a"}}'
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # 3. NÜKLEER PUSU MODU (0.5 Saniye Reaksiyon Süresi)
          while true; do
            # Wakelock'un build.gradle dosyasını bul
            WAKELOCK_GRADLE=$(find /home/runner/.pub-cache -name "build.gradle" -path "*/wakelock_plus/*" 2>/dev/null | head -1)
            if [ ! -z "$WAKELOCK_GRADLE" ]; then
              # Aynı dosyaya defalarca yazmamak için kontrol
              if ! grep -q "com.wakelock_plus.patched" "$WAKELOCK_GRADLE"; then
                echo "✅ Wakelock build.gradle bulundu, NÜKLEER YAMA uygulanıyor!"
                
                # A: En tepeye sahte flutter objesi yerleştir (Unknown property hatası için)
                sed -i '1i project.ext.flutter = [compileSdkVersion: 35, minSdkVersion: 21, targetSdkVersion: 35]' "$WAKELOCK_GRADLE"
                
                # B: Eski Kotlin plugin kalıntılarını tamamen sil
                sed -i "s/apply plugin.*kotlin-android//g" "$WAKELOCK_GRADLE"
                sed -i "s/id.*kotlin-android.*//g" "$WAKELOCK_GRADLE"
                
                # C: flutter.xxx değişkenlerini rakamlara çevir
                sed -i 's/flutter\.compileSdkVersion/35/g' "$WAKELOCK_GRADLE"
                sed -i 's/flutter\.minSdkVersion/21/g' "$WAKELOCK_GRADLE"
                sed -i 's/flutter\.targetSdkVersion/35/g' "$WAKELOCK_GRADLE"
                
                # D: Namespace zorlaması yap ve SDK'ları ekle (Substring on null hatası için)
                sed -i '/android {/a \    namespace "com.wakelock_plus.patched"\n    compileSdkVersion 35\n    defaultConfig {\n        minSdkVersion 21\n        targetSdkVersion 35\n    }' "$WAKELOCK_GRADLE"
              fi
            fi

            # Settings.gradle bul ve Kotlin sürümünü güncelle
            SETTINGS_GRADLE=$(find /tmp -name "settings.gradle" 2>/dev/null | head -1)
            if [ ! -z "$SETTINGS_GRADLE" ]; then
              if ! grep -q "2.0.21" "$SETTINGS_GRADLE"; then
                echo "✅ Settings.gradle bulundu, Kotlin 2.0.21'e çekiliyor!"
                sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.0.21"/g' "$SETTINGS_GRADLE"
              fi
            fi

            # App build.gradle bul ve metadata kontrolünü baypas et
            APP_BUILD=$(find /tmp -name "build.gradle" -path "*/app/build.gradle" 2>/dev/null | head -1)
            if [ ! -z "$APP_BUILD" ]; then
              if ! grep -q "Xskip-metadata-version-check" "$APP_BUILD"; then
                echo "✅ App build.gradle bulundu, Metadata Bypass ekleniyor!"
                sed -i '/kotlinOptions {/a \        freeCompilerArgs += ["-Xskip-metadata-version-check"]' "$APP_BUILD"
              fi
            fi

            # Çok hızlı tepki ver! (5 saniye çok uzundu, bunu 0.5'e çektik)
            sleep 0.5
          done &

          # 4. FİNAL VURUŞ (FLET BUILD)
          flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "0.4.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk