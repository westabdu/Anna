name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
          unzip -q commandlinetools-linux-12266719_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx tesseract-ocr tesseract-ocr-tur libzbar0 build-essential libgtk-3-dev

      - name: Accept Android Licenses (SDK 35 Destekli)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "platforms;android-35" "build-tools;33.0.0" "build-tools;35.0.0" || true
          yes | flutter doctor --android-licenses || true

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1

      - name: Final Build (Wakelock - Phoenix Çözümü)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          FLET_NON_INTERACTIVE: "true"
        run: |
          # 1. PIP VE NUMPY YAPILANDIRMASI
          mkdir -p ~/.pip
          cat > ~/.pip/pip.conf << EOF
          [global]
          index-url = https://pypi.flet.dev
          trusted-host = pypi.flet.dev
          EOF

          cat > requirements.txt << EOF
          flet-embed==0.24.1
          EOF

          mkdir -p ./libs
          pip download --only-binary :all: --platform manylinux2014_aarch64 --python-version 3.12 --dest ./libs numpy==1.26.4 || true

          # 2. ANDROID KONFİGÜRASYONU
          export SERIOUS_PYTHON_CONFIG='{"android": {"ndk_version": "25.2.9519653", "arch": "arm64-v8a"}}'
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # 3. PUSU MODU (Küllerinden Doğan Wakelock)
          while true; do
            WAKELOCK_DIR=$(find /home/runner/.pub-cache -type d -name "wakelock_plus-1.4.0" 2>/dev/null | head -1)
            if [ ! -z "$WAKELOCK_DIR" ]; then
              WAKELOCK_GRADLE="$WAKELOCK_DIR/android/build.gradle"
              echo "🔥 Wakelock dir: $WAKELOCK_DIR"
              echo "🔥 Wakelock gradle: $WAKELOCK_GRADLE"
              
              cat > "$WAKELOCK_GRADLE" << 'EOF'
          group 'com.wakelock_plus'
          version '1.0-SNAPSHOT'

          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }

          apply plugin: 'com.android.library'

          project.ext.flutter = [
              compileSdkVersion: 35,
              minSdkVersion: 21,
              targetSdkVersion: 35
          ]

          android {
              namespace "com.wakelock_plus"
              compileSdkVersion 35

              defaultConfig {
                  minSdkVersion 21
                  targetSdkVersion 35
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF
              echo "✅ Wakelock build.gradle küllerinden yeniden doğdu!"
              break
            fi

            SETTINGS_GRADLE=$(find /tmp -name "settings.gradle" 2>/dev/null | head -1)
            if [ ! -z "$SETTINGS_GRADLE" ] && ! grep -q "2.0.21" "$SETTINGS_GRADLE"; then
              sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.0.21"/g' "$SETTINGS_GRADLE"
              echo "✅ Settings.gradle Kotlin 2.0.21'e güncellendi!"
            fi

            sleep 2
          done &

          # 4. FİNAL VURUŞ
          flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "0.4.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk