name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx tesseract-ocr tesseract-ocr-tur libzbar0 build-essential

      - name: Install Flet (Stabil)
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1

      - name: Final Build (Geceyi Bitiren Hamle)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          FLET_NON_INTERACTIVE: "true"
        run: |
          # 1. KOTLIN VE GRADLE YAMASI (Geri planda hazır)
          while true; do
            SETTINGS_GRADLE=$(find /tmp -name "settings.gradle" 2>/dev/null | head -1)
            if [ ! -z "$SETTINGS_GRADLE" ]; then
              sed -i 's/plugins {/plugins {\n    id "org.jetbrains.kotlin.android" version "1.9.24" apply false/g' "$SETTINGS_GRADLE" 2>/dev/null
              break
            fi
            sleep 1
          done &

          # 2. NUMPY'I PROJENİN KALBİNE YERLEŞTİRME (Pip'i Bypass Ediyoruz)
          # Pip'in Android için hata verdiği paketleri önceden indirip "vendor" klasörüne açıyoruz.
          mkdir -p __pypackages__
          pip install --target=./__pypackages__ --only-binary :all: --platform manylinux2014_x86_64 --python-version 3.11 numpy==1.26.4

          # 3. FLET'E "BUNLARI KURMA, BEN ZATEN KOYDUM" DİYORUZ
          # requirements.txt dosyasını boş bırakıyoruz ki Flet Pip'i çalıştırmasın
          touch requirements.txt

          # 4. ANA BUILD KOMUTU
          # --include-packages ile kendi hazırladığımız paket klasörünü içeri alıyoruz
          yes | flet build apk --verbose \
            --include-packages numpy \
            --build-number ${{ github.run_number }} \
            --build-version "${{ github.event.inputs.version || '0.4' }}.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk