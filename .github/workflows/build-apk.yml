name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
          unzip -q commandlinetools-linux-12266719_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx tesseract-ocr tesseract-ocr-tur libzbar0 build-essential libgtk-3-dev

      - name: Accept Android Licenses (SDK 35 Destekli)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "platforms;android-35" "build-tools;33.0.0" "build-tools;35.0.0" || true
          yes | flutter doctor --android-licenses || true

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1

      - name: Final Build (Zırhlı Paket - Her Şey Dahil Fix)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          FLET_NON_INTERACTIVE: "true"
        run: |
          # 1. ÖNDEN MÜDAHALE (Eklentileri indir ve daha doğmadan yamala)
          echo "Eklentiler pub-cache'e çekiliyor..."
          flutter pub cache add wakelock_plus
          flutter pub cache add flutter_plugin_android_lifecycle
          
          echo "Pub-cache içindeki sinsi dosyalar temizleniyor..."
          # Tüm build.gradle dosyalarında flutter değişkenine güvenmek yerine 35'i çakıyoruz
          find /home/runner/.pub-cache -name "build.gradle" -type f -exec sed -i 's/flutter.compileSdkVersion/35/g' {} + 2>/dev/null || true
          find /home/runner/.pub-cache -name "build.gradle" -type f -exec sed -i 's/flutter.targetSdkVersion/35/g' {} + 2>/dev/null || true
          find /home/runner/.pub-cache -name "build.gradle" -type f -exec sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/g' {} + 2>/dev/null || true
          find /home/runner/.pub-cache -name "build.gradle" -type f -exec sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/g' {} + 2>/dev/null || true

          # 🛡️ Pusu Modu (V6 - Nükleer Seçenek)
          while true; do
            # 1. Bütün dosyaları bul
            ALL_GRADLES=$(find /tmp -name "build.gradle" 2>/dev/null)
            ALL_SETTINGS=$(find /tmp -name "settings.gradle" 2>/dev/null)

            # 2. Kotlin Sürümünü GLOBAL olarak 2.1.0'a kitle
            for s in $ALL_SETTINGS; do
              sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.1.0"/g' "$s"
              # Eğer plugin tanımı yoksa zorla ekle
              if ! grep -q "org.jetbrains.kotlin.android" "$s"; then
                sed -i '/plugins {/a \    id "org.jetbrains.kotlin.android" version "2.1.0" apply false' "$s"
              fi
            done

            for g in $ALL_GRADLES; do
              # 3. SDK ve Java 17 Ayarları (Tam Uyum)
              sed -i 's/compileSdk = .*/compileSdk = 35/g' "$g"
              sed -i 's/targetSdk = .*/targetSdk = 35/g' "$g"
              sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g' "$g"
              sed -i 's/JavaVersion.VERSION_11/JavaVersion.VERSION_17/g' "$g"

              # 4. EN KRİTİK KISIM: Wakelock gibi inatçı modüllere Kotlin 2.1.0 enjekte et
              if grep -q "apply plugin: 'kotlin-android'" "$g" || grep -q "id 'org.jetbrains.kotlin.android'" "$g"; then
                # build.gradle içinde ext.kotlin_version varsa güncelle
                sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "2.1.0"/g' "$g"
              fi

              # 5. Metadata Hatasını Sustur ve K2'yi zorla kapat
              if ! grep -q "Xskip-metadata-version-check" "$g"; then
                if grep -q "kotlinOptions {" "$g"; then
                  sed -i '/kotlinOptions {/a \        freeCompilerArgs += ["-Xskip-metadata-version-check", "-P", "kotlin.experimental.tryK2=false"]' "$g"
                fi
              fi
            done
            sleep 2
          done &

          # 3. PIP VE NUMPY YAPILANDIRMASI (Senin kazandığın cephe)
          mkdir -p ~/.pip
          cat > ~/.pip/pip.conf << EOF
          [global]
          index-url = https://pypi.flet.dev
          trusted-host = pypi.flet.dev
          EOF

          cat > requirements.txt << EOF
          flet-embed==0.24.1
          EOF

          mkdir -p ./libs
          pip download --only-binary :all: --platform manylinux2014_aarch64 --python-version 3.12 --dest ./libs numpy==1.26.4 || true

          # 4. ANDROID KONFİGÜRASYONU
          export SERIOUS_PYTHON_CONFIG='{"android": {"ndk_version": "25.2.9519653", "arch": "arm64-v8a"}}'
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # 5. FİNAL VURUŞ
          flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "0.4.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk