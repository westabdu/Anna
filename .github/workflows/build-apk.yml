name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
          unzip -q commandlinetools-linux-12266719_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx tesseract-ocr tesseract-ocr-tur libzbar0 build-essential libgtk-3-dev

      - name: Accept Android Licenses (SDK 35 Destekli)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "platforms;android-35" "build-tools;33.0.0" "build-tools;35.0.0" || true
          yes | flutter doctor --android-licenses || true

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.24.1

      - name: Final Build (ÇÖZÜM - Kotlin Metadata + Wakelock Sabitleme)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          FLET_NON_INTERACTIVE: "true"
        run: |
          # 1. PIP VE NUMPY YAPILANDIRMASI
          mkdir -p ~/.pip
          cat > ~/.pip/pip.conf << EOF
          [global]
          index-url = https://pypi.flet.dev
          trusted-host = pypi.flet.dev
          EOF

          cat > requirements.txt << EOF
          flet-embed==0.24.1
          EOF

          mkdir -p ./libs
          pip download --only-binary :all: --platform manylinux2014_aarch64 --python-version 3.12 --dest ./libs numpy==1.26.4 || true

          # 2. ANDROID KONFİGÜRASYONU
          export SERIOUS_PYTHON_CONFIG='{"android": {"ndk_version": "25.2.9519653", "arch": "arm64-v8a"}}'
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # 3. PUSU MODU (Kesin Çözüm - ÇİFT YÖNLÜ MÜDAHALE)
          while true; do
            # --- Hedef 1: Wakelock'un build.gradle dosyası (AGP 9 Hatası) [citation:1]---
            WAKELOCK_GRADLE=$(find /home/runner/.pub-cache -name "build.gradle" -path "*/wakelock_plus-1.4.0/*" 2>/dev/null | head -1)
            if [ ! -z "$WAKELOCK_GRADLE" ]; then
              echo "🎯 Wakelock build.gradle bulundu: $WAKELOCK_GRADLE"
              
              # ÇÖZÜM 1: Kotlin plugin satırlarını tamamen kaldır
              sed -i '/id "org.jetbrains.kotlin.android"/d' "$WAKELOCK_GRADLE"
              sed -i '/apply plugin.*kotlin-android/d' "$WAKELOCK_GRADLE"
              
              # ÇÖZÜM 2: 'project.ext.flutter' tanımındaki değişkenleri sabit değerlerle değiştir (28. satır civarı)
              sed -i 's/flutter\.compileSdkVersion/35/g' "$WAKELOCK_GRADLE"
              sed -i 's/flutter\.minSdkVersion/21/g' "$WAKELOCK_GRADLE"
              sed -i 's/flutter\.targetSdkVersion/35/g' "$WAKELOCK_GRADLE"
              
              # ÇÖZÜM 3: compileSdkVersion'ı doğrudan ekle
              if ! grep -q "compileSdkVersion" "$WAKELOCK_GRADLE"; then
                sed -i '/android {/a \    compileSdkVersion 35' "$WAKELOCK_GRADLE"
              fi
              
              # ÇÖZÜM 4: minSdkVersion ve targetSdkVersion'ı defaultConfig'e ekle
              if ! grep -q "minSdkVersion" "$WAKELOCK_GRADLE"; then
                sed -i '/defaultConfig {/a \        minSdkVersion 21\n        targetSdkVersion 35' "$WAKELOCK_GRADLE"
              fi
              echo "✅ Wakelock build.gradle tamamen yamalandı!"
            fi

            # --- Hedef 2: Settings.gradle (Kotlin Sürümü) ---
            SETTINGS_GRADLE=$(find /tmp -name "settings.gradle" 2>/dev/null | head -1)
            if [ ! -z "$SETTINGS_GRADLE" ] && ! grep -q "2.0.21" "$SETTINGS_GRADLE"; then
              sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.0.21"/g' "$SETTINGS_GRADLE"
              echo "✅ Settings.gradle Kotlin 2.0.21'e güncellendi!"
            fi

            # --- Hedef 3: App build.gradle (Metadata Bypass) ---
            APP_BUILD=$(find /tmp -name "build.gradle" -path "*/app/build.gradle" 2>/dev/null | head -1)
            if [ ! -z "$APP_BUILD" ]; then
              # Tüm Kotlin metadata uyumsuzluğunu baypas et [citation:2]
              if ! grep -q "Xskip-metadata-version-check" "$APP_BUILD"; then
                sed -i '/kotlinOptions {/a \        freeCompilerArgs += ["-Xskip-metadata-version-check"]' "$APP_BUILD"
                echo "✅ App build.gradle metadata check bypass edildi!"
              fi
            fi

            sleep 2
          done &

          # 4. FİNAL VURUŞ
          flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "0.4.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk