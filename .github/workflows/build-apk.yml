name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo docker image prune --all --force
          df -h

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            tesseract-ocr \
            tesseract-ocr-tur \
            libzbar0 \
            build-essential

      - name: Configure pip for Flet packages
        run: |
          mkdir -p ~/.pip
          cat > ~/.pip/pip.conf << EOF
          [global]
          extra-index-url = https://pypi.flet.dev
          trusted-host = pypi.flet.dev
          EOF
          echo "PIP_EXTRA_INDEX_URL=https://pypi.flet.dev" >> $GITHUB_ENV
          echo "PIP_TRUSTED_HOST=pypi.flet.dev" >> $GITHUB_ENV

      - name: Install Python Dependencies
        env:
          PIP_EXTRA_INDEX_URL: https://pypi.flet.dev
          PIP_TRUSTED_HOST: pypi.flet.dev
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Flet'in önceden derlenmiş paketlerini zorla
          pip install --only-binary :all: --no-cache-dir numpy==1.26.4
          pip install --no-cache-dir flet==0.22.0
          pip install --no-cache-dir opencv-python-headless==4.9.0.80
          pip install --no-cache-dir googletrans==4.0.2
          # Diğer ağır kütüphaneler
          pip install --no-cache-dir mediapipe easyocr pytesseract pyzbar SpeechRecognition gTTS edge-tts pygame pvporcupine sounddevice soundfile google-generativeai groq pillow python-dotenv requests psutil

      - name: Accept Android Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter config --no-analytics

      - name: Final Build (Anka Kuşu - Zorla NumPy Yükleme)
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          PIP_CACHE_DIR: /tmp/pip-cache
          TMPDIR: /tmp
        run: |
          # 1. KOTLIN YAMASI (Pusu 1)
          while true; do
            SETTINGS_GRADLE=$(find /tmp -name "settings.gradle" 2>/dev/null | head -1)
            if [ ! -z "$SETTINGS_GRADLE" ]; then
              sed -i 's/plugins {/plugins {\n    id "org.jetbrains.kotlin.android" version "1.9.24" apply false/g' "$SETTINGS_GRADLE" 2>/dev/null
              break
            fi
            sleep 1
          done &

          # 2. GERİLLA YAMA V17 (Pusu 2 - Gradle Müdahalesi)
          while true; do
            ALL_GRADLES=$(find /tmp -name "*.gradle" 2>/dev/null)
            if [ ! -z "$ALL_GRADLES" ]; then
              for gradle in $ALL_GRADLES; do
                sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' "$gradle" 2>/dev/null
                if [[ "$gradle" == *"build.gradle"* ]] && grep -q "android {" "$gradle"; then
                  sed -i '/android {/a \    packagingOptions { doNotStrip "**/*.so"; pickFirst "**/*.so" }' "$gradle"
                  sed -i '/android {/a \    aaptOptions { noCompress "so", "zip", "gz", "pyc", "ttf", "otf", "tflite" }' "$gradle"
                  sed -i 's/compileSdk = .*/compileSdk = 34/g' "$gradle" 2>/dev/null
                  sed -i 's/targetSdk = .*/targetSdk = 34/g' "$gradle" 2>/dev/null
                fi
              done
              break
            fi
            sleep 1
          done &

          # 3. NUMPY ZORLAMA OPERASYONU (3.12 Ayarı)
          rm -rf ~/.cache/pip
          rm -rf /tmp/pip-*
          mkdir -p /tmp/numpy-wheel
          
          # BURASI KRİTİK: python-version 3.12 olarak güncellendi
          pip download --only-binary :all: --platform manylinux2014_x86_64 --python-version 3.12 --dest /tmp/numpy-wheel numpy==1.26.4
          
          export PIP_FIND_LINKS=/tmp/numpy-wheel
          export PIP_NO_INDEX=false
          
          # Gereksinimler dosyası
          echo "numpy==1.26.4" > requirements.txt

          # 4. ANA BUILD KOMUTU (Tireler alt tire yapıldı!)
          flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "${{ github.event.inputs.version || '0.4' }}.${{ github.run_number }}" \
            --include-packages opencv-python-headless,mediapipe,easyocr

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk