name: Build ANNA Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK Versiyonu'
        required: false
        default: '0.4'
        type: string
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # DİSK TEMİZLİĞİ - En başta yap!
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          sudo apt-get clean
          df -h
          echo "Disk temizlendi!"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev \
            libgomp1 \
            tesseract-ocr \
            tesseract-ocr-tur \
            libzbar0 \
            build-essential \
            gfortran \
            libopenblas-dev \
            liblapack-dev \
            pkg-config \
            python3-dev

      - name: Prepare Workspace
        env:
          PYTHONUTF8: 1
        run: |
          if [ -f requirements.txt ]; then
            cat requirements.txt | tr -d '\r' > req_tmp.txt
            mv req_tmp.txt requirements.txt
          fi
          find . -name "*.pyc" -delete
          find . -name "*.so" -delete
          
          # Pip önbelleğini farklı dizine yönlendir
          mkdir -p /tmp/pip-cache
          export PIP_CACHE_DIR=/tmp/pip-cache

      # SADECE GEREKLİ PAKETLERİ KUR (gereksizleri atla)
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          
          # NumPy - en kritik
          pip install --only-binary :all: --no-cache-dir numpy==1.26.4
          
          # Flet
          pip install --no-cache-dir flet==0.22.0
          
          # OpenCV
          pip install --no-cache-dir opencv-python-headless==4.9.0.80
          
          # Çeviri
          pip install --no-cache-dir googletrans==4.0.2
          
          # MediaPipe ve EasyOCR (çok büyük, sıkıntı çıkarırsa kaldır)
          pip install --no-cache-dir mediapipe easyocr || true
          
          # Diğerleri (isteğe bağlı)
          pip install --no-cache-dir pytesseract pyzbar SpeechRecognition gTTS edge-tts pygame pvporcupine sounddevice soundfile google-generativeai groq pillow python-dotenv requests psutil || true

      - name: Accept Android Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter config --no-analytics

      - name: Final Build
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true
          PYTHONUTF8: 1
          PIP_CACHE_DIR: /tmp/pip-cache
          TMPDIR: /tmp
        run: |
          # Kotlin Yaması
          while true; do
            SETTINGS_GRADLE=$(find /tmp -name "settings.gradle" 2>/dev/null | head -1)
            if [ ! -z "$SETTINGS_GRADLE" ]; then
              sed -i 's/plugins {/plugins {\n    id "org.jetbrains.kotlin.android" version "1.9.24" apply false/g' "$SETTINGS_GRADLE" 2>/dev/null
              break
            fi
            sleep 1
          done &
          
          # Build komutu
          flet build apk --verbose \
            --build-number ${{ github.run_number }} \
            --build-version "${{ github.event.inputs.version || '0.4' }}.${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anna-mobile-release
          path: build/apk/*.apk